[package]
name = "wallet-wasm"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
harmoniis-wallet = { version = "0.1.66", default-features = false, features = ["wasm"] }
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde-wasm-bindgen = "0.6"
js-sys = "0.3"
getrandom = { version = "0.2", features = ["js"] }
getrandom_0_3 = { package = "getrandom", version = "0.3", features = ["wasm_js"] }
hex = "0.4"
sha2 = "0.10"
aes-gcm = "0.10"
# Not needed directly — bitcoin types come through harmoniis-wallet

[dev-dependencies]
wasm-bindgen-test = "0.3"
