name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Rust + wasm-pack for wallet-wasm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/wallet-wasm
      - run: cargo install wasm-pack --locked
      - run: sudo apt-get install -y binaryen
      - run: cd crates/wallet-wasm && wasm-pack build --release --target web --out-dir pkg
      - run: wasm-opt --enable-bulk-memory --enable-nontrapping-float-to-int --enable-sign-ext --enable-mutable-globals -Oz -o crates/wallet-wasm/pkg/wallet_wasm_bg.wasm crates/wallet-wasm/pkg/wallet_wasm_bg.wasm

      # Node + SvelteKit
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build

  deploy:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      # Rust + wasm-pack
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/wallet-wasm
      - run: cargo install wasm-pack --locked
      - run: sudo apt-get install -y binaryen
      - run: cd crates/wallet-wasm && wasm-pack build --release --target web --out-dir pkg
      - run: wasm-opt --enable-bulk-memory --enable-nontrapping-float-to-int --enable-sign-ext --enable-mutable-globals -Oz -o crates/wallet-wasm/pkg/wallet_wasm_bg.wasm crates/wallet-wasm/pkg/wallet_wasm_bg.wasm

      # Node + build + deploy
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: "/wallet"
      - uses: actions/upload-pages-artifact@v4
        with:
          path: build/
      - uses: actions/deploy-pages@v5
        id: deployment

      # Deploy OG worker to Cloudflare (direct wrangler, no Node 20 action wrapper)
      - name: Deploy OG Worker
        working-directory: worker
        run: npm install && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  release:
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --generate-notes
