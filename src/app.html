<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
		<meta name="referrer" content="no-referrer" />

		<!-- Theme detection + background — MUST be first to prevent white flash -->
		<script>
			(function(){
				var d=document.documentElement,dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
				if(dark)d.classList.add('dark');
				var bg=dark?'#0e0f15':'#fff';
				d.style.background=bg;
				var l=document.getElementById('app-loader');
				if(l)l.style.background=bg;
				// Capture install prompt globally — fires before Svelte mounts
				window.addEventListener('beforeinstallprompt',function(e){
					e.preventDefault();
					window.__installPrompt=e;
				});
			})()
		</script>

		<title>Weby Wallet</title>
		<meta name="description" content="You received webcash — open to claim it in your wallet" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Weby Wallet" />
		<meta property="og:title" content="You received webcash" />
		<meta property="og:description" content="Open to redeem" />
		<meta property="og:image" content="https://weby.cash/wallet/og.png" />
		<meta property="og:image:secure_url" content="https://weby.cash/wallet/og.png" />
		<meta property="og:image:type" content="image/png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="You received webcash — open to redeem" />
		<meta property="og:url" content="https://weby.cash/wallet" />

		<!-- Twitter / X -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="You received webcash" />
		<meta name="twitter:description" content="Open to redeem" />
		<meta name="twitter:image" content="https://weby.cash/wallet/og.png" />

		<!-- Theme -->
		<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0A0A0F" media="(prefers-color-scheme: dark)" />

		<!-- PWA -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Weby" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />

		<!-- Icons -->
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="shortcut icon" href="%sveltekit.assets%/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />

		<style>
			@keyframes loader-spin{to{transform:rotate(360deg)}}
			#app-loader .ring{width:48px;height:48px;border-radius:50%;border:4px solid transparent;animation:loader-spin .8s linear infinite}
			#app-loader.fade-out{opacity:0;pointer-events:none;transition:none}
			@media(prefers-color-scheme:light){#app-loader{background:#fff}#app-loader .ring{border-top-color:#003DA5;border-right-color:rgba(0,61,165,0.3)}}
			@media(prefers-color-scheme:dark){#app-loader{background:#0e0f15}#app-loader .ring{border-top-color:#8bb4ff;border-right-color:rgba(139,180,255,0.3)}}
		</style>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="app-loader" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center">
			<div class="ring"></div>
		</div>
		<div id="app-root" style="display:contents;opacity:0;transition:opacity .5s cubic-bezier(0,0,0.2,1)">%sveltekit.body%</div>
	</body>
</html>
