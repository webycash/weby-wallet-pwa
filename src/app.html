<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="referrer" content="no-referrer" />

		<!-- Theme detection + background — MUST be first to prevent white flash -->
		<script>
			(function(){
				var d=document.documentElement,dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
				if(dark)d.classList.add('dark');
				d.style.background=dark?'#0A0B14':'#fff';
			})()
		</script>

		<title>Weby Wallet</title>
		<meta name="description" content="You received webcash — open to claim it in your wallet" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Weby Wallet" />
		<meta property="og:title" content="You received webcash" />
		<meta property="og:description" content="Open to claim it in your wallet" />
		<meta property="og:image" content="https://weby.cash/wallet/og.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="Weby Wallet — You received webcash" />
		<meta property="og:url" content="https://weby.cash/wallet" />

		<!-- Twitter / X -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="You received webcash" />
		<meta name="twitter:description" content="Open to claim it in your wallet" />
		<meta name="twitter:image" content="https://weby.cash/wallet/og.png" />

		<!-- Theme -->
		<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0A0A0F" media="(prefers-color-scheme: dark)" />

		<!-- PWA -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Weby" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />

		<!-- Icons -->
		<link rel="icon" href="%sveltekit.assets%/logo.svg" type="image/svg+xml" />
		<link rel="icon" href="%sveltekit.assets%/icons/icon-192.png" type="image/png" sizes="192x192" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icons/apple-touch-icon.png" />

		<!-- Loader animation — inline to avoid FOUC -->
		<style>
			@keyframes breathe{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
			#app-loader.fade-out{opacity:0;pointer-events:none}
		</style>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="app-loader" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity .3s ease">
			<div style="width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;animation:breathe 2s ease-in-out infinite">
				<svg width="56" height="56" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
					<circle cx="32" cy="32" r="30" stroke="#055DFF" stroke-width="2.5"/>
					<text x="32" y="42" text-anchor="middle" font-size="28" font-weight="700" font-family="system-ui,sans-serif" fill="#055DFF">W</text>
				</svg>
			</div>
			<span style="font-size:13px;font-weight:500;color:#6B7A99;font-family:system-ui,sans-serif;letter-spacing:.05em">Loading wallet</span>
		</div>
		<div style="display:contents">%sveltekit.body%</div>
	</body>
</html>
