<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="referrer" content="no-referrer" />

		<!-- Theme detection + background — MUST be first to prevent white flash -->
		<script>
			(function(){
				var d=document.documentElement,dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
				if(dark)d.classList.add('dark');
				d.style.background=dark?'#0e0f15':'#fff';
			})()
		</script>

		<title>Weby Wallet</title>
		<meta name="description" content="You received webcash — open to claim it in your wallet" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Weby Wallet" />
		<meta property="og:title" content="You received webcash" />
		<meta property="og:description" content="Open to redeem" />
		<meta property="og:image" content="https://weby.cash/wallet/og.png" />
		<meta property="og:image:secure_url" content="https://weby.cash/wallet/og.png" />
		<meta property="og:image:type" content="image/png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="You received webcash — open to redeem" />
		<meta property="og:url" content="https://weby.cash/wallet" />

		<!-- Twitter / X -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="You received webcash" />
		<meta name="twitter:description" content="Open to redeem" />
		<meta name="twitter:image" content="https://weby.cash/wallet/og.png" />

		<!-- Theme -->
		<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0A0A0F" media="(prefers-color-scheme: dark)" />

		<!-- PWA -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Weby" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />

		<!-- Icons -->
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="shortcut icon" href="%sveltekit.assets%/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />

		<style>
			@keyframes spin{to{transform:rotate(360deg)}}
			#app-loader.fade-out{opacity:0;pointer-events:none}
		</style>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="app-loader" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .3s ease">
			<svg id="app-spinner" width="56" height="56" viewBox="0 0 56 56" fill="none" style="animation:spin 1s linear infinite">
				<circle cx="28" cy="28" r="25" stroke-width="2" opacity=".1"/>
				<path d="M53 28a25 25 0 00-25-25" stroke-width="2" stroke-linecap="round"/>
				<defs><linearGradient id="t" x1="53" y1="28" x2="28" y2="3"><stop/><stop offset="1" stop-opacity="0"/></linearGradient></defs>
			</svg>
		</div>
		<script>
			(function(){
				var dark=document.documentElement.classList.contains('dark');
				var c=dark?'#7ba3f0':'#1a3f8a';
				var s=document.getElementById('app-spinner');
				if(s){s.querySelector('circle').setAttribute('stroke',c);s.querySelector('path').style.stroke='url(#t)';var stops=s.querySelectorAll('stop');stops[0].setAttribute('stop-color',c);stops[1].setAttribute('stop-color',c)}
			})()
		</script>
		<div style="display:contents">%sveltekit.body%</div>
	</body>
</html>
