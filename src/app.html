<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="referrer" content="no-referrer" />

		<!-- Theme detection + background — MUST be first to prevent white flash -->
		<script>
			(function(){
				var d=document.documentElement,dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
				if(dark)d.classList.add('dark');
				d.style.background=dark?'#0A0B14':'#fff';
			})()
		</script>

		<title>Weby Wallet</title>
		<meta name="description" content="You received webcash — open to claim it in your wallet" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Weby Wallet" />
		<meta property="og:title" content="You received webcash" />
		<meta property="og:description" content="Open to claim it in your wallet" />
		<meta property="og:image" content="https://weby.cash/wallet/og.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="Weby Wallet — You received webcash" />
		<meta property="og:url" content="https://weby.cash/wallet" />

		<!-- Twitter / X -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="You received webcash" />
		<meta name="twitter:description" content="Open to claim it in your wallet" />
		<meta name="twitter:image" content="https://weby.cash/wallet/og.png" />

		<!-- Theme -->
		<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0A0A0F" media="(prefers-color-scheme: dark)" />

		<!-- PWA -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Weby" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />

		<!-- Icons -->
		<link rel="icon" href="%sveltekit.assets%/logo.svg" type="image/svg+xml" />
		<link rel="icon" href="%sveltekit.assets%/icons/icon-192.png" type="image/png" sizes="192x192" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icons/apple-touch-icon.png" />

		<style>
			@keyframes spin{to{transform:rotate(360deg)}}
			#app-loader.fade-out{opacity:0;pointer-events:none}
		</style>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="app-loader" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .3s ease">
			<svg width="40" height="40" viewBox="0 0 40 40" fill="none" style="animation:spin 1s linear infinite">
				<circle cx="20" cy="20" r="18" stroke="#055DFF" stroke-width="1.5" opacity=".08"/>
				<path d="M38 20a18 18 0 00-18-18" stroke="url(#t)" stroke-width="1.5" stroke-linecap="round"/>
				<defs><linearGradient id="t" x1="38" y1="20" x2="20" y2="2"><stop stop-color="#055DFF"/><stop offset="1" stop-color="#055DFF" stop-opacity="0"/></linearGradient></defs>
			</svg>
		</div>
		<div style="display:contents">%sveltekit.body%</div>
	</body>
</html>
