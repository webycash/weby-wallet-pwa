<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
		<meta name="referrer" content="no-referrer" />

		<!-- Theme detection + background — MUST be first to prevent white flash -->
		<script>
			(function(){
				var d=document.documentElement,dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
				if(dark)d.classList.add('dark');
				var bg=dark?'#0f0c14':'#faf9fc';
				d.style.background=bg;
				var l=document.getElementById('app-loader');
				if(l)l.style.background=bg;
				// Capture install prompt globally — fires before Svelte mounts
				window.addEventListener('beforeinstallprompt',function(e){
					e.preventDefault();
					window.__installPrompt=e;
				});
			})()
		</script>

		<title>Weby Wallet</title>
		<meta name="description" content="You received webcash — open to claim it in your wallet" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Weby Wallet" />
		<meta property="og:title" content="You received webcash" />
		<meta property="og:description" content="Open to redeem" />
		<meta property="og:image" content="https://weby.cash/wallet/og.png" />
		<meta property="og:image:secure_url" content="https://weby.cash/wallet/og.png" />
		<meta property="og:image:type" content="image/png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="You received webcash — open to redeem" />
		<meta property="og:url" content="https://weby.cash/wallet" />

		<!-- Twitter / X -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="You received webcash" />
		<meta name="twitter:description" content="Open to redeem" />
		<meta name="twitter:image" content="https://weby.cash/wallet/og.png" />

		<!-- Theme -->
		<meta name="theme-color" content="#faf9fc" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0f0c14" media="(prefers-color-scheme: dark)" />

		<!-- PWA -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Weby" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />

		<!-- Fonts — preconnect + render-blocking link to prevent FOUC -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" />

		<!-- Icons -->
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="shortcut icon" href="%sveltekit.assets%/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />

		<style>
			@keyframes loader-spin{to{transform:rotate(360deg)}}
			#app-loader{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center}
			#app-loader svg{width:72px;height:72px;animation:loader-spin 1.2s linear infinite}
			#app-loader{background:#faf9fc;color:#7c4dbd}
			.dark #app-loader{background:#0f0c14;color:#a07de0}
		</style>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="app-loader">
			<svg viewBox="0 0 50 50" fill="none">
				<defs>
					<linearGradient id="lg1" gradientUnits="userSpaceOnUse" x1="4" y1="25" x2="46" y2="25">
						<stop offset="0%" stop-color="currentColor" stop-opacity="0"/>
						<stop offset="100%" stop-color="currentColor" stop-opacity="1"/>
					</linearGradient>
				</defs>
				<path d="M4 25 A21 21 0 0 1 46 25" stroke="url(#lg1)" stroke-width="3.5" stroke-linecap="round"/>
			</svg>
		</div>
		<div id="app-root" style="opacity:0;transition:opacity .5s cubic-bezier(0,0,0.2,1)">%sveltekit.body%</div>
	</body>
</html>
